<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <form action="thankyou.html" method="get">

        <fieldset id="fieldset">
            
        <!-- Name -->
        <label for="name">Name</label>
        <input type="text" name="name" value="" id="name" required>
        <br> <br>
        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" name="email" placeholder="sophie@example.com" id="email" value="" required>
        <br> <br>
        <!-- Phone Number -->
        <label for="tel">Phone Number</label>
        <input type="tel" name="tel" value="" id="phone number" required>
        <br> <br>
        <!-- Male -->
        <label for="male">Male</label>
        <input type="radio" name="male" id="male" value="">
         <!-- Male -->
         <label for="female">Female</label>
         <input type="radio" name="female" id="female" value="">
         <br> <br>
          <!-- Password -->
          <label for="password">Password</label>
          <input type="password" name="password" id="password" value="" required>
          
          <br> <br>

          <button type="submit" class="submit">Submit <a href="thankyou.html" target="_top"></a> </button>

    
    </fieldset>

    </form>
    

    
    <script src="index.js"></script>
</body>
</html>
